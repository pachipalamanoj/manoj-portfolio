trigger:
- main

variables:
  acrName: manojappcr
  imageName: manojwebapp
  resourceGroup: manojdevops-rg
  containerApp: manojinovations
  tag: $(Build.BuildId)

stages:

# BUILD STAGE
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
        npm run build
      displayName: Build Angular App

    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        containerRegistry: manoj-acr-connection
        repository: $(imageName)
        command: buildAndPush
        Dockerfile: $(Build.SourcesDirectory)/Dockerfile
        tags: |
          $(tag)

# DEPLOY STAGE
- stage: Deploy
  displayName: Deploy Stage
  dependsOn: Build

  jobs:
  - job: DeployJob
    pool:
      vmImage: ubuntu-latest

    steps:
    - checkout: self

    - task: AzureCLI@2
      inputs:
        azureSubscription: manoj-azure-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az containerapp update \
            --name $(containerApp) \
            --resource-group $(resourceGroup) \
            --image $(acrName).azurecr.io/$(imageName):$(tag)