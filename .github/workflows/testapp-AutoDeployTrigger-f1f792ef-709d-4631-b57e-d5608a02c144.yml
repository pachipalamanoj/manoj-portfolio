name: Trigger auto deployment for testapp

on:
  push:
    branches: 
      - test
    paths:
      - '**'
      - '.github/workflows/testapp-AutoDeployTrigger-f1f792ef-709d-4631-b57e-d5608a02c144.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TESTAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TESTAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TESTAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}

          # Docker configuration
          dockerfilePath: ./Dockerfile

          # Azure Container Registry (MAKE SURE THIS EXISTS)
          acrName: manojacr

          # App details
          containerAppName: testapp
          resourceGroup: manojdevops-rg
          containerAppEnvironment: manojwebappenv

          # Image to build and push
          imageToBuild: manojacr.azurecr.io/testapp:${{ github.sha }}

          # Optional but recommended
          targetPort: 80
          ingress: external
